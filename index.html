<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real Estate Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); min-height: 100vh; margin: 0; }
    .btn { transition: transform 0.1s; }
    .btn:active { transform: scale(0.95); }
  </style>
</head>
<body class="text-white p-4">
  <div id="app" class="max-w-lg mx-auto">
    <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent mb-1">🏠 Real Estate Tracker</h1>
    <p class="text-slate-400 text-sm mb-6">Bay Area price predictions</p>

    <div class="mb-6">
      <label class="block text-sm text-slate-400 mb-2">📍 Location</label>
      <div class="grid grid-cols-2 gap-3">
        <button id="btn-sanmateo" onclick="setLocation('san-mateo')" class="btn py-4 rounded-xl text-lg font-semibold bg-blue-600 shadow-lg">San Mateo</button>
        <button id="btn-albany" onclick="setLocation('albany')" class="btn py-4 rounded-xl text-lg font-semibold bg-slate-700/50 border border-slate-600">Albany</button>
      </div>
    </div>

    <div class="mb-6">
      <label class="block text-sm text-slate-400 mb-2">📐 Size: <span id="sqft-display" class="text-white font-bold">1,800 sq ft</span></label>
      <div class="flex flex-wrap gap-2" id="sqft-buttons"></div>
    </div>

    <div class="mb-6">
      <label class="block text-sm text-slate-400 mb-2">📅 Predict For</label>
      <div class="flex flex-wrap gap-2" id="date-buttons"></div>
    </div>

    <div id="prediction" class="bg-gradient-to-br from-blue-900/60 to-emerald-900/60 rounded-2xl p-5 mb-6 border border-blue-500/30">
      <div class="text-center mb-4">
        <p class="text-slate-400 text-sm">Predicted Price</p>
        <p id="price" class="text-5xl font-bold mt-1">$1.46M</p>
        <p id="details" class="text-slate-400 text-sm mt-2">1,800 sq ft • San Mateo</p>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div class="bg-slate-800/50 rounded-xl p-4 text-center">
          <p class="text-slate-400 text-xs">Range</p>
          <p id="range" class="text-lg font-semibold text-emerald-400">$1.39M - $1.52M</p>
        </div>
        <div class="bg-slate-800/50 rounded-xl p-4 text-center">
          <p class="text-slate-400 text-xs">Confidence</p>
          <p id="confidence" class="text-3xl font-bold text-emerald-400">82%</p>
        </div>
      </div>
    </div>

    <footer class="mt-6 text-center text-slate-500 text-xs">Built for Cameron</footer>
  </div>

  <script>
    var location = 'san-mateo';
    var sqft = 1800;
    var months = 6;

    var SQFT_OPTIONS = [1200, 1500, 1800, 2200, 2800];
    var DATE_OPTIONS = [{label:'3mo',m:3},{label:'6mo',m:6},{label:'1yr',m:12},{label:'2yr',m:24}];

    function formatPrice(p) { return p >= 1000000 ? '$' + (p/1000000).toFixed(2) + 'M' : '$' + (p/1000).toFixed(0) + 'K'; }

    function predict() {
      var basePrice = location === 'san-mateo' ? 1200000 : 950000;
      var ppsf = location === 'san-mateo' ? 850 : 720;
      var base = basePrice + (sqft - 1500) * ppsf;
      var trend = 1.35 + (months * 0.005);
      var predicted = Math.round(base * trend);
      var confidence = Math.max(30, 100 - (months * 3));
      var uncertainty = (100 - confidence) / 100;
      var low = Math.round(predicted * (1 - uncertainty * 0.15));
      var high = Math.round(predicted * (1 + uncertainty * 0.15));

      document.getElementById('price').textContent = formatPrice(predicted);
      document.getElementById('details').textContent = sqft.toLocaleString() + ' sq ft • ' + (location === 'san-mateo' ? 'San Mateo' : 'Albany');
      document.getElementById('range').textContent = formatPrice(low) + ' - ' + formatPrice(high);
      document.getElementById('confidence').textContent = confidence + '%';
      document.getElementById('confidence').className = 'text-3xl font-bold ' + (confidence > 70 ? 'text-emerald-400' : confidence > 50 ? 'text-yellow-400' : 'text-red-400');
    }

    function setLocation(loc) {
      location = loc;
      document.getElementById('btn-sanmateo').className = 'btn py-4 rounded-xl text-lg font-semibold ' + (loc === 'san-mateo' ? 'bg-blue-600 shadow-lg' : 'bg-slate-700/50 border border-slate-600');
      document.getElementById('btn-albany').className = 'btn py-4 rounded-xl text-lg font-semibold ' + (loc === 'albany' ? 'bg-blue-600 shadow-lg' : 'bg-slate-700/50 border border-slate-600');
      predict();
    }

    function setSqft(s) {
      sqft = s;
      document.getElementById('sqft-display').textContent = s.toLocaleString() + ' sq ft';
      renderSqftButtons();
      predict();
    }

    function setMonths(m) {
      months = m;
      renderDateButtons();
      predict();
    }

    function renderSqftButtons() {
      var container = document.getElementById('sqft-buttons');
      var html = '';
      for (var i = 0; i < SQFT_OPTIONS.length; i++) {
        var s = SQFT_OPTIONS[i];
        html += '<button onclick="setSqft('+s+')" class="btn py-3 px-4 rounded-xl font-medium '+(sqft===s?'bg-emerald-600 shadow-lg':'bg-slate-700/50 border border-slate-600')+'">'+s.toLocaleString()+'</button>';
      }
      container.innerHTML = html;
    }

    function renderDateButtons() {
      var container = document.getElementById('date-buttons');
      var html = '';
      for (var i = 0; i < DATE_OPTIONS.length; i++) {
        var d = DATE_OPTIONS[i];
        html += '<button onclick="setMonths('+d.m+')" class="btn py-3 px-5 rounded-xl font-medium '+(months===d.m?'bg-purple-600 shadow-lg':'bg-slate-700/50 border border-slate-600')+'">'+d.label+'</button>';
      }
      container.innerHTML = html;
    }

    renderSqftButtons();
    renderDateButtons();
    predict();
  </script>
</body>
</html>
