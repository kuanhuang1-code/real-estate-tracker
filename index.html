<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏠 Real Estate Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .gradient-text { background: linear-gradient(to right, #60a5fa, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-white p-4 sm:p-6">
  <div class="max-w-4xl mx-auto">
    <!-- Header -->
    <header class="mb-6">
      <h1 class="text-2xl sm:text-4xl font-bold gradient-text">🏠 Real Estate Tracker</h1>
      <p class="text-slate-400 text-sm mt-1">Bay Area price predictions</p>
    </header>

    <!-- Location Toggle -->
    <div class="mb-6">
      <label class="block text-sm font-medium text-slate-400 mb-2">📍 Location</label>
      <div class="grid grid-cols-2 gap-3">
        <button id="btn-san-mateo" onclick="setLocation('san-mateo')" class="py-4 px-4 rounded-xl text-lg font-semibold transition-all bg-blue-600 text-white shadow-lg shadow-blue-500/30">San Mateo</button>
        <button id="btn-albany" onclick="setLocation('albany')" class="py-4 px-4 rounded-xl text-lg font-semibold transition-all bg-slate-700/50 text-slate-300 border border-slate-600">Albany</button>
      </div>
    </div>

    <!-- Square Footage -->
    <div class="mb-6">
      <label class="block text-sm font-medium text-slate-400 mb-2">📐 House Size: <span id="sqft-display" class="text-white font-bold">1,800 sq ft</span></label>
      <div class="flex flex-wrap gap-2" id="sqft-buttons"></div>
      <input type="range" id="sqft-slider" min="800" max="4000" step="100" value="1800" oninput="setSqft(this.value)" class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-emerald-500 mt-3">
    </div>

    <!-- Prediction Timeframe -->
    <div class="mb-6">
      <label class="block text-sm font-medium text-slate-400 mb-2">📅 Predict For</label>
      <div class="flex flex-wrap gap-2" id="time-buttons"></div>
    </div>

    <!-- Prediction Result Card -->
    <div id="prediction-card" class="bg-gradient-to-br from-blue-900/60 to-emerald-900/60 rounded-2xl p-5 mb-6 border border-blue-500/30">
      <div class="text-center mb-4">
        <p class="text-slate-400 text-sm">Predicted Price</p>
        <p id="predicted-price" class="text-5xl sm:text-6xl font-bold text-white mt-1">$1.85M</p>
        <p id="prediction-details" class="text-slate-400 text-sm mt-2">1,800 sq ft • San Mateo</p>
      </div>
      <div class="grid grid-cols-2 gap-4 mt-4">
        <div class="bg-slate-800/50 rounded-xl p-4 text-center">
          <p class="text-slate-400 text-xs">Range</p>
          <p id="price-low" class="text-lg font-semibold text-emerald-400 mt-1">$1.72M</p>
          <p class="text-slate-500 text-xs">to</p>
          <p id="price-high" class="text-lg font-semibold text-emerald-400">$1.98M</p>
        </div>
        <div class="bg-slate-800/50 rounded-xl p-4 text-center">
          <p class="text-slate-400 text-xs">Confidence</p>
          <p id="confidence" class="text-4xl font-bold mt-2 text-emerald-400">85%</p>
          <p id="confidence-label" class="text-slate-500 text-xs mt-1">High</p>
        </div>
      </div>
    </div>

    <!-- Chart -->
    <div class="bg-slate-800/50 rounded-2xl p-4 border border-slate-700 mb-6">
      <h2 class="text-lg font-semibold mb-3">📈 Price Trend</h2>
      <div class="h-64 sm:h-80">
        <canvas id="priceChart"></canvas>
      </div>
    </div>

    <!-- Footer -->
    <footer class="mt-8 text-center text-slate-500 text-xs">
      Built for Cameron • Predictions are estimates only
    </footer>
  </div>

  <script>
    // State
    let location = 'san-mateo';
    let sqft = 1800;
    let months = 6;
    let chart = null;

    // Data
    const AREA_DATA = {
      'san-mateo': { basePrice: 1650000, pricePerSqft: 920, trend: 0.04 },
      'albany': { basePrice: 1150000, pricePerSqft: 780, trend: 0.035 }
    };

    const SQFT_PRESETS = [1200, 1500, 1800, 2200, 2800, 3500];
    const TIME_PRESETS = [
      { label: '3mo', months: 3 },
      { label: '6mo', months: 6 },
      { label: '1yr', months: 12 },
      { label: '2yr', months: 24 },
      { label: '5yr', months: 60 }
    ];

    // Initialize
    function init() {
      renderSqftButtons();
      renderTimeButtons();
      updatePrediction();
      renderChart();
    }

    function renderSqftButtons() {
      const container = document.getElementById('sqft-buttons');
      container.innerHTML = SQFT_PRESETS.map(size => `
        <button onclick="setSqft(${size})" class="sqft-btn py-3 px-5 rounded-xl text-base font-medium transition-all ${sqft === size ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-500/30' : 'bg-slate-700/50 text-slate-300 border border-slate-600'}" data-sqft="${size}">
          ${size.toLocaleString()}
        </button>
      `).join('');
    }

    function renderTimeButtons() {
      const container = document.getElementById('time-buttons');
      container.innerHTML = TIME_PRESETS.map(preset => `
        <button onclick="setMonths(${preset.months})" class="time-btn py-3 px-5 rounded-xl text-base font-medium transition-all ${months === preset.months ? 'bg-purple-600 text-white shadow-lg shadow-purple-500/30' : 'bg-slate-700/50 text-slate-300 border border-slate-600'}" data-months="${preset.months}">
          ${preset.label}
        </button>
      `).join('');
    }

    function setLocation(loc) {
      location = loc;
      document.getElementById('btn-san-mateo').className = `py-4 px-4 rounded-xl text-lg font-semibold transition-all ${loc === 'san-mateo' ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/30' : 'bg-slate-700/50 text-slate-300 border border-slate-600'}`;
      document.getElementById('btn-albany').className = `py-4 px-4 rounded-xl text-lg font-semibold transition-all ${loc === 'albany' ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/30' : 'bg-slate-700/50 text-slate-300 border border-slate-600'}`;
      updatePrediction();
      renderChart();
    }

    function setSqft(value) {
      sqft = parseInt(value);
      document.getElementById('sqft-display').textContent = sqft.toLocaleString() + ' sq ft';
      document.getElementById('sqft-slider').value = sqft;
      renderSqftButtons();
      updatePrediction();
      renderChart();
    }

    function setMonths(m) {
      months = m;
      renderTimeButtons();
      updatePrediction();
      renderChart();
    }

    function calculatePrice(loc, sq, monthsAhead) {
      const data = AREA_DATA[loc];
      const basePrice = data.basePrice + (sq - 1500) * data.pricePerSqft;
      const growth = Math.pow(1 + data.trend, monthsAhead / 12);
      return Math.round(basePrice * growth);
    }

    function formatPrice(price) {
      if (price >= 1000000) {
        return '$' + (price / 1000000).toFixed(2) + 'M';
      }
      return '$' + (price / 1000).toFixed(0) + 'K';
    }

    function updatePrediction() {
      const predictedPrice = calculatePrice(location, sqft, months);
      const confidence = Math.max(50, 95 - months * 1.5);
      const uncertainty = (100 - confidence) / 100;
      const low = Math.round(predictedPrice * (1 - uncertainty * 0.15));
      const high = Math.round(predictedPrice * (1 + uncertainty * 0.15));

      document.getElementById('predicted-price').textContent = formatPrice(predictedPrice);
      document.getElementById('prediction-details').textContent = `${sqft.toLocaleString()} sq ft • ${location === 'san-mateo' ? 'San Mateo' : 'Albany'} • ${months} months`;
      document.getElementById('price-low').textContent = formatPrice(low);
      document.getElementById('price-high').textContent = formatPrice(high);
      document.getElementById('confidence').textContent = Math.round(confidence) + '%';
      
      const confEl = document.getElementById('confidence');
      const labelEl = document.getElementById('confidence-label');
      if (confidence > 70) {
        confEl.className = 'text-4xl font-bold mt-2 text-emerald-400';
        labelEl.textContent = 'High';
      } else if (confidence > 50) {
        confEl.className = 'text-4xl font-bold mt-2 text-yellow-400';
        labelEl.textContent = 'Medium';
      } else {
        confEl.className = 'text-4xl font-bold mt-2 text-red-400';
        labelEl.textContent = 'Low';
      }
    }

    function renderChart() {
      const ctx = document.getElementById('priceChart').getContext('2d');
      
      // Generate historical data (past 3 years)
      const labels = [];
      const historicalPrices = [];
      const futurePrices = [];
      
      const now = new Date();
      
      // Past 36 months
      for (let i = -36; i <= 0; i++) {
        const date = new Date(now);
        date.setMonth(date.getMonth() + i);
        labels.push(date.toLocaleDateString('en-US', { month: 'short', year: '2-digit' }));
        
        const noise = 1 + (Math.random() - 0.5) * 0.06;
        const price = calculatePrice(location, sqft, i) * noise;
        historicalPrices.push(Math.round(price));
        futurePrices.push(null);
      }
      
      // Future months
      for (let i = 1; i <= months; i++) {
        const date = new Date(now);
        date.setMonth(date.getMonth() + i);
        labels.push(date.toLocaleDateString('en-US', { month: 'short', year: '2-digit' }));
        historicalPrices.push(null);
        futurePrices.push(calculatePrice(location, sqft, i));
      }

      if (chart) chart.destroy();
      
      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            {
              label: 'Historical',
              data: historicalPrices,
              borderColor: '#10b981',
              backgroundColor: 'rgba(16, 185, 129, 0.1)',
              fill: true,
              tension: 0.3,
              pointRadius: 0
            },
            {
              label: 'Predicted',
              data: futurePrices,
              borderColor: '#8b5cf6',
              borderDash: [5, 5],
              backgroundColor: 'rgba(139, 92, 246, 0.1)',
              fill: true,
              tension: 0.3,
              pointRadius: 0
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: true,
              labels: { color: '#9ca3af' }
            },
            tooltip: {
              callbacks: {
                label: (context) => formatPrice(context.raw)
              }
            }
          },
          scales: {
            x: {
              ticks: { color: '#9ca3af', maxTicksLimit: 8 },
              grid: { color: '#374151' }
            },
            y: {
              ticks: {
                color: '#9ca3af',
                callback: (value) => formatPrice(value)
              },
              grid: { color: '#374151' }
            }
          }
        }
      });
    }

    // Start
    init();
  </script>
</body>
</html>
