<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏠 Real Estate Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .gradient-text { background: linear-gradient(to right, #60a5fa, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .btn-active-blue { background-color: #2563eb !important; color: white !important; box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3) !important; }
    .btn-active-green { background-color: #059669 !important; color: white !important; box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3) !important; }
    .btn-active-purple { background-color: #9333ea !important; color: white !important; box-shadow: 0 10px 15px -3px rgba(139, 92, 246, 0.3) !important; }
    .btn-inactive { background-color: rgba(51, 65, 85, 0.5); color: #cbd5e1; border: 1px solid #475569; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-white p-4 sm:p-6">
  <div class="max-w-4xl mx-auto">
    <!-- Header -->
    <header class="mb-6">
      <h1 class="text-2xl sm:text-4xl font-bold gradient-text">🏠 Real Estate Tracker</h1>
      <p class="text-slate-400 text-sm mt-1">Bay Area price predictions</p>
    </header>

    <!-- Location Toggle -->
    <div class="mb-6">
      <label class="block text-sm font-medium text-slate-400 mb-2">📍 Location</label>
      <div class="grid grid-cols-2 gap-3">
        <button id="btn-san-mateo" class="py-4 px-4 rounded-xl text-lg font-semibold transition-all btn-active-blue">San Mateo</button>
        <button id="btn-albany" class="py-4 px-4 rounded-xl text-lg font-semibold transition-all btn-inactive">Albany</button>
      </div>
    </div>

    <!-- Square Footage -->
    <div class="mb-6">
      <label class="block text-sm font-medium text-slate-400 mb-2">📐 House Size: <span id="sqft-display" class="text-white font-bold">1,800 sq ft</span></label>
      <div class="flex flex-wrap gap-2" id="sqft-buttons">
        <button class="sqft-btn py-3 px-5 rounded-xl text-base font-medium transition-all btn-inactive" data-sqft="1200">1,200</button>
        <button class="sqft-btn py-3 px-5 rounded-xl text-base font-medium transition-all btn-inactive" data-sqft="1500">1,500</button>
        <button class="sqft-btn py-3 px-5 rounded-xl text-base font-medium transition-all btn-active-green" data-sqft="1800">1,800</button>
        <button class="sqft-btn py-3 px-5 rounded-xl text-base font-medium transition-all btn-inactive" data-sqft="2200">2,200</button>
        <button class="sqft-btn py-3 px-5 rounded-xl text-base font-medium transition-all btn-inactive" data-sqft="2800">2,800</button>
        <button class="sqft-btn py-3 px-5 rounded-xl text-base font-medium transition-all btn-inactive" data-sqft="3500">3,500</button>
      </div>
      <input type="range" id="sqft-slider" min="800" max="4000" step="100" value="1800" class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-emerald-500 mt-3">
    </div>

    <!-- Prediction Timeframe -->
    <div class="mb-6">
      <label class="block text-sm font-medium text-slate-400 mb-2">📅 Predict For</label>
      <div class="flex flex-wrap gap-2" id="time-buttons">
        <button class="time-btn py-3 px-5 rounded-xl text-base font-medium transition-all btn-inactive" data-months="3">3mo</button>
        <button class="time-btn py-3 px-5 rounded-xl text-base font-medium transition-all btn-active-purple" data-months="6">6mo</button>
        <button class="time-btn py-3 px-5 rounded-xl text-base font-medium transition-all btn-inactive" data-months="12">1yr</button>
        <button class="time-btn py-3 px-5 rounded-xl text-base font-medium transition-all btn-inactive" data-months="24">2yr</button>
        <button class="time-btn py-3 px-5 rounded-xl text-base font-medium transition-all btn-inactive" data-months="60">5yr</button>
      </div>
    </div>

    <!-- Prediction Result Card -->
    <div id="prediction-card" class="bg-gradient-to-br from-blue-900/60 to-emerald-900/60 rounded-2xl p-5 mb-6 border border-blue-500/30">
      <div class="text-center mb-4">
        <p class="text-slate-400 text-sm">Predicted Price</p>
        <p id="predicted-price" class="text-5xl sm:text-6xl font-bold text-white mt-1">$1.85M</p>
        <p id="prediction-details" class="text-slate-400 text-sm mt-2">1,800 sq ft • San Mateo • 6 months</p>
      </div>
      <div class="grid grid-cols-2 gap-4 mt-4">
        <div class="bg-slate-800/50 rounded-xl p-4 text-center">
          <p class="text-slate-400 text-xs">Range</p>
          <p id="price-low" class="text-lg font-semibold text-emerald-400 mt-1">$1.72M</p>
          <p class="text-slate-500 text-xs">to</p>
          <p id="price-high" class="text-lg font-semibold text-emerald-400">$1.98M</p>
        </div>
        <div class="bg-slate-800/50 rounded-xl p-4 text-center">
          <p class="text-slate-400 text-xs">Confidence</p>
          <p id="confidence" class="text-4xl font-bold mt-2 text-emerald-400">91%</p>
          <p id="confidence-label" class="text-slate-500 text-xs mt-1">High</p>
        </div>
      </div>
    </div>

    <!-- Chart -->
    <div class="bg-slate-800/50 rounded-2xl p-4 border border-slate-700 mb-6">
      <h2 class="text-lg font-semibold mb-3">📈 Price Trend</h2>
      <div style="height: 300px; position: relative;">
        <canvas id="priceChart"></canvas>
      </div>
    </div>

    <!-- Footer -->
    <footer class="mt-8 text-center text-slate-500 text-xs">
      Built for Cameron • Predictions are estimates only
    </footer>
  </div>

  <script>
    // State
    let currentLocation = 'san-mateo';
    let currentSqft = 1800;
    let currentMonths = 6;
    let priceChart = null;

    // Data
    const AREA_DATA = {
      'san-mateo': { basePrice: 1650000, pricePerSqft: 920, trend: 0.04 },
      'albany': { basePrice: 1150000, pricePerSqft: 780, trend: 0.035 }
    };

    // Calculate price
    function calculatePrice(loc, sq, monthsAhead) {
      const data = AREA_DATA[loc];
      const basePrice = data.basePrice + (sq - 1500) * data.pricePerSqft;
      const growth = Math.pow(1 + data.trend, monthsAhead / 12);
      return Math.round(basePrice * growth);
    }

    // Format price
    function formatPrice(price) {
      if (price >= 1000000) {
        return '$' + (price / 1000000).toFixed(2) + 'M';
      }
      return '$' + Math.round(price / 1000) + 'K';
    }

    // Update prediction display
    function updatePrediction() {
      const predictedPrice = calculatePrice(currentLocation, currentSqft, currentMonths);
      const confidence = Math.max(50, 95 - currentMonths * 0.7);
      const uncertainty = (100 - confidence) / 100;
      const low = Math.round(predictedPrice * (1 - uncertainty * 0.15));
      const high = Math.round(predictedPrice * (1 + uncertainty * 0.15));

      document.getElementById('predicted-price').textContent = formatPrice(predictedPrice);
      document.getElementById('prediction-details').textContent = 
        currentSqft.toLocaleString() + ' sq ft • ' + 
        (currentLocation === 'san-mateo' ? 'San Mateo' : 'Albany') + ' • ' + 
        (currentMonths >= 12 ? (currentMonths/12) + ' year' + (currentMonths > 12 ? 's' : '') : currentMonths + ' months');
      document.getElementById('price-low').textContent = formatPrice(low);
      document.getElementById('price-high').textContent = formatPrice(high);
      document.getElementById('confidence').textContent = Math.round(confidence) + '%';
      
      const confEl = document.getElementById('confidence');
      const labelEl = document.getElementById('confidence-label');
      if (confidence > 80) {
        confEl.className = 'text-4xl font-bold mt-2 text-emerald-400';
        labelEl.textContent = 'High';
      } else if (confidence > 60) {
        confEl.className = 'text-4xl font-bold mt-2 text-yellow-400';
        labelEl.textContent = 'Medium';
      } else {
        confEl.className = 'text-4xl font-bold mt-2 text-red-400';
        labelEl.textContent = 'Low';
      }
      
      updateChart();
    }

    // Update chart
    function updateChart() {
      const labels = [];
      const historicalData = [];
      const predictedData = [];
      
      const now = new Date();
      
      // Historical: past 24 months
      for (let i = -24; i <= 0; i++) {
        const date = new Date(now);
        date.setMonth(date.getMonth() + i);
        labels.push(date.toLocaleDateString('en-US', { month: 'short', year: '2-digit' }));
        
        // Add some realistic variation
        const seasonality = Math.sin((date.getMonth() / 12) * Math.PI * 2) * 0.02;
        const noise = (Math.random() - 0.5) * 0.03;
        const price = calculatePrice(currentLocation, currentSqft, i) * (1 + seasonality + noise);
        historicalData.push(Math.round(price));
        predictedData.push(null);
      }
      
      // Future: up to selected months
      for (let i = 1; i <= currentMonths; i++) {
        const date = new Date(now);
        date.setMonth(date.getMonth() + i);
        labels.push(date.toLocaleDateString('en-US', { month: 'short', year: '2-digit' }));
        historicalData.push(null);
        predictedData.push(calculatePrice(currentLocation, currentSqft, i));
      }

      // Connect the lines at current month
      if (historicalData.length > 0 && predictedData.length > historicalData.filter(x => x !== null).length) {
        const lastHistorical = historicalData.filter(x => x !== null).pop();
        const firstPredictedIndex = predictedData.findIndex(x => x !== null);
        if (firstPredictedIndex > 0) {
          predictedData[firstPredictedIndex - 1] = lastHistorical;
        }
      }

      if (priceChart) {
        priceChart.data.labels = labels;
        priceChart.data.datasets[0].data = historicalData;
        priceChart.data.datasets[1].data = predictedData;
        priceChart.update('none');
      } else {
        const ctx = document.getElementById('priceChart').getContext('2d');
        priceChart = new Chart(ctx, {
          type: 'line',
          data: {
            labels: labels,
            datasets: [
              {
                label: 'Historical',
                data: historicalData,
                borderColor: '#10b981',
                backgroundColor: 'rgba(16, 185, 129, 0.1)',
                fill: true,
                tension: 0.3,
                pointRadius: 0,
                borderWidth: 2
              },
              {
                label: 'Predicted',
                data: predictedData,
                borderColor: '#a855f7',
                backgroundColor: 'rgba(168, 85, 247, 0.1)',
                borderDash: [6, 4],
                fill: true,
                tension: 0.3,
                pointRadius: 0,
                borderWidth: 2
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: {
              intersect: false,
              mode: 'index'
            },
            plugins: {
              legend: {
                display: true,
                position: 'top',
                labels: { color: '#9ca3af', usePointStyle: true }
              },
              tooltip: {
                backgroundColor: '#1f2937',
                titleColor: '#f3f4f6',
                bodyColor: '#d1d5db',
                borderColor: '#374151',
                borderWidth: 1,
                callbacks: {
                  label: function(context) {
                    if (context.raw === null) return null;
                    return context.dataset.label + ': ' + formatPrice(context.raw);
                  }
                }
              }
            },
            scales: {
              x: {
                ticks: { color: '#9ca3af', maxTicksLimit: 8, maxRotation: 0 },
                grid: { color: 'rgba(55, 65, 81, 0.5)' }
              },
              y: {
                ticks: {
                  color: '#9ca3af',
                  callback: function(value) { return formatPrice(value); }
                },
                grid: { color: 'rgba(55, 65, 81, 0.5)' }
              }
            }
          }
        });
      }
    }

    // Event Listeners
    document.getElementById('btn-san-mateo').addEventListener('click', function() {
      currentLocation = 'san-mateo';
      this.className = 'py-4 px-4 rounded-xl text-lg font-semibold transition-all btn-active-blue';
      document.getElementById('btn-albany').className = 'py-4 px-4 rounded-xl text-lg font-semibold transition-all btn-inactive';
      updatePrediction();
    });

    document.getElementById('btn-albany').addEventListener('click', function() {
      currentLocation = 'albany';
      this.className = 'py-4 px-4 rounded-xl text-lg font-semibold transition-all btn-active-blue';
      document.getElementById('btn-san-mateo').className = 'py-4 px-4 rounded-xl text-lg font-semibold transition-all btn-inactive';
      updatePrediction();
    });

    // Sqft buttons
    document.querySelectorAll('.sqft-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        currentSqft = parseInt(this.dataset.sqft);
        document.getElementById('sqft-display').textContent = currentSqft.toLocaleString() + ' sq ft';
        document.getElementById('sqft-slider').value = currentSqft;
        document.querySelectorAll('.sqft-btn').forEach(function(b) {
          b.className = 'sqft-btn py-3 px-5 rounded-xl text-base font-medium transition-all btn-inactive';
        });
        this.className = 'sqft-btn py-3 px-5 rounded-xl text-base font-medium transition-all btn-active-green';
        updatePrediction();
      });
    });

    // Sqft slider
    document.getElementById('sqft-slider').addEventListener('input', function() {
      currentSqft = parseInt(this.value);
      document.getElementById('sqft-display').textContent = currentSqft.toLocaleString() + ' sq ft';
      document.querySelectorAll('.sqft-btn').forEach(function(b) {
        if (parseInt(b.dataset.sqft) === currentSqft) {
          b.className = 'sqft-btn py-3 px-5 rounded-xl text-base font-medium transition-all btn-active-green';
        } else {
          b.className = 'sqft-btn py-3 px-5 rounded-xl text-base font-medium transition-all btn-inactive';
        }
      });
      updatePrediction();
    });

    // Time buttons
    document.querySelectorAll('.time-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        currentMonths = parseInt(this.dataset.months);
        document.querySelectorAll('.time-btn').forEach(function(b) {
          b.className = 'time-btn py-3 px-5 rounded-xl text-base font-medium transition-all btn-inactive';
        });
        this.className = 'time-btn py-3 px-5 rounded-xl text-base font-medium transition-all btn-active-purple';
        updatePrediction();
      });
    });

    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
      updatePrediction();
    });
    
    // Fallback init
    if (document.readyState === 'complete' || document.readyState === 'interactive') {
      updatePrediction();
    }
  </script>
</body>
</html>
